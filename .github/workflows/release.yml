name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: |
          make build
          ls -la dist

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wpback_linux_amd64
            dist/wpback_linux_arm64
            dist/wpback_linux_arm
